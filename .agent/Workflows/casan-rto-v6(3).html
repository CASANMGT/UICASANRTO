:root{--bg:#07090E;--s1:#0C1018;--s2:#111723;--s3:#1A2234;--b1:#1E2A3E;--b2:#2A3A52;--ac:#00E5C3;--ac1:rgba(0,229,195,.07);--ac2:rgba(0,229,195,.16);--g:#34D399;--g1:rgba(52,211,153,.07);--w:#FBBF24;--w1:rgba(251,191,36,.07);--d:#F87171;--d1:rgba(248,113,113,.07);--bl:#60A5FA;--bl1:rgba(96,165,250,.07);--p:#A78BFA;--p1:rgba(167,139,250,.07);--o:#FB923C;--o1:rgba(251,146,60,.07);--exp:#FF6B35;--exp1:rgba(255,107,53,.08);--t1:#F0F4F8;--t2:#94A3B8;--t3:#5B6B82;--r:10px;--r2:7px}

try{map=L.map('map',{center:[-6.25,106.845],zoom:11,zoomControl:false,attributionControl:false});L.control.zoom({position:'bottomleft'}).addTo(map);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);setTimeout(()=>{const tp=document.querySelector('.leaflet-tile-pane');if(tp)tp.style.filter='invert(1) hue-rotate(180deg) brightness(.6) contrast(1.2) saturate(.2)'},300);cGrp=typeof L.markerClusterGroup==='function'?L.markerClusterGroup({maxClusterRadius:35,showCoverageOnHover:false}):null;if(cGrp)map.addLayer(cGrp);mapReady=true;rMapF();updMkrs()}catch(e){console.warn(e);document.getElementById('map').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3)">Map error</div>'}}
function rMapF(){document.getElementById('mf').innerHTML=[{k:'active',l:'Active',c:ST.active.c},{k:'expiring',l:'Expiring',c:'#FF6B35'},{k:'grace',l:'Grace',c:ST.grace.c},{k:'immobilized',l:'Immob.',c:ST.immobilized.c},{k:'paused',l:'Paused',c:ST.paused.c},{k:'available',l:'Avail.',c:ST.available.c},{k:'online',l:'Online',c:'#34D399'},{k:'offline',l:'Offline',c:'#FF6B6B'}].map(i=>'<button class="mfb '+(mapF[i.k]?'on':'')+'" onclick="togMF(\''+i.k+'\')" style="'+(mapF[i.k]?'border-color:'+i.c+'40':'')+'"><div class="dot" style="background:'+i.c+';opacity:'+(mapF[i.k]?1:.3)+'"></div><span>'+i.l+'</span></button>').join('')}
function togMF(k){mapF[k]=!mapF[k];rMapF();updMkrs()}
function updMkrs(){if(!mapReady||typeof L==='undefined')return;if(cGrp)cGrp.clearLayers();const vs=filtDlr();vs.forEach(v=>{const sc=ST[v.st];if(!sc)return;const online=isOn(v),expiring=isExp(v);if(!mapF[v.st])return;if(expiring&&!mapF.expiring)return;if(online&&!mapF.online)return;if(!online&&!mapF.offline)return;const col=!online?'#FF6B6B':expiring?'#FF6B35':sc.c;const glow=!online?'box-shadow:0 0 4px rgba(255,107,107,.3)':expiring?'box-shadow:0 0 6px rgba(255,107,53,.4)':'box-shadow:0 0 4px '+sc.c+'40';const html='<div style="width:10px;height:10px;border-radius:50%;background:'+col+';border:2px solid #0a0e14;'+glow+'"></div>';const icon=L.divIcon({className:'',html:'<div style="width:18px;height:18px;display:flex;align-items:center;justify-content:center">'+html+'</div>',iconSize:[18,18],iconAnchor:[9,9]});const dl=DLR.find(d=>d.id===v.op);const pr=PRG.find(p=>p.id===v.prog);const pop='<div style="font-family:IBM Plex Mono,monospace;font-size: var(--text-xs);line-height:1.6"><div style="font-weight:700;color:'+col+'">'+v.id+' — '+v.mdl+'</div><div style="color:#94A3B8">'+(v.cust||'—')+' • '+(pr?pr.sn:'')+'</div><div style="color:#94A3B8">'+(dl?dl.name:'')+' • '+(online?'🟢 Online':'🔴 Offline '+tAgo(v.ping))+'</div><div>Credits: <b style="color:'+col+'">'+(v.dc<1&&v.dc>0?'<1':Math.floor(v.dc))+'d</b> • '+sc.ic+' '+sc.l+(expiring?' ⚠️':'')+'</div></div>';const m=L.marker([v.lat,v.lng],{icon}).bindPopup(pop,{closeButton:false});m.on('click',()=>{sVeh=v.id;lastIds=[];rCards()});if(cGrp)cGrp.addLayer(m);else m.addTo(map)});const onN=vs.filter(isOn).length;document.getElementById('mleg').innerHTML='<div class="lg"><div class="lg-d" style="background:var(--g)"></div><span class="m">'+onN+' Online</span></div><div class="lg"><div class="lg-d" style="background:#FF6B6B"></div><span class="m">'+(vs.length-onN)+' Offline</span></div>'}
function rDSel(){const el=document.getElementById('dSel');el.innerHTML='<option value="all">All Dealers ('+VEH.length+')</option>'+DLR.map(d=>'<option value="'+d.id+'">'+d.name+' ('+VEH.filter(v=>v.op===d.id).length+')</option>').join('');el.value=sDlr}
function chgD(){sDlr=document.getElementById('dSel').value;vPage=0;refAll()}
function rNav(){document.getElementById('nav').innerHTML=[{k:'fleet',l:'🗺️ Fleet & Tracking'},{k:'finance',l:'💰 Finance'}].map(t=>'<button class="m '+(view===t.k?'on':'')+'" onclick="sw(\''+t.k+'\')">'+t.l+'</button>').join('')}
function sw(v){view=v;rNav();document.getElementById('fv').style.display=v==='fleet'?'flex':'none';document.getElementById('fnv').style.display=v==='finance'?'flex':'none';if(v==='fleet'){rFlt();rCards();rVPg();if(mapReady)setTimeout(()=>{try{map.invalidateSize()}catch(e){}updMkrs()},80)}if(v==='finance'){rPrg();rFin()}}
function rStats(){const vs=filtDlr(),tx=filtTxDlr(),pd=tx.filter(t=>t.st==='paid');const rev=pd.reduce((s,t)=>s+t.amt,0);const on=vs.filter(isOn).length;const expC=vs.filter(isExp).length;document.getElementById('stats').innerHTML=[{l:'Fleet',v:vs.length,c:'var(--t1)'},{l:'Active',v:vs.filter(v=>v.st==='active').length,c:'var(--g)'},{l:'Expiring',v:expC,c:'var(--exp)'},{l:'Grace',v:vs.filter(v=>v.st==='grace').length,c:'var(--w)'},{l:'Immobilized',v:vs.filter(v=>v.st==='immobilized').length,c:'var(--d)'},{l:'Online',v:on+'/'+vs.length,c:'var(--ac)',sm:1},{l:'Revenue',v:fRp(rev),c:'var(--p)',sm:1}].map(s=>'<div class="st"><div class="st-l m">'+s.l+'</div><div class="st-v '+(s.sm?'sm':'')+' m" style="color:'+s.c+'">'+s.v+'</div></div>').join('')}
function filtDlr(){return sDlr==='all'?VEH:VEH.filter(v=>v.op===sDlr)}
function filtTxDlr(){return sDlr==='all'?TXS:TXS.filter(t=>t.op===sDlr)}
function rFlt(){const vs=filtDlr();const fltrs=[{k:'all',l:'All',n:vs.length,cls:'fa'},{k:'active',l:'Active',n:vs.filter(v=>v.st==='active').length,cls:'fg'},{k:'expiring',l:'Expiring',n:vs.filter(isExp).length,cls:'fe'},{k:'grace',l:'Grace',n:vs.filter(v=>v.st==='grace').length,cls:'fw'},{k:'immobilized',l:'Immob.',n:vs.filter(v=>v.st==='immobilized').length,cls:'fd'},{k:'paused',l:'Paused',n:vs.filter(v=>v.st==='paused').length,cls:'fp'},{k:'offline',l:'Offline',n:vs.filter(v=>!isOn(v)&&v.st!=='available').length,cls:'fo'},{k:'online',l:'Online',n:vs.filter(isOn).length,cls:'fg'}];document.getElementById('fBar').innerHTML=fltrs.map(t=>'<button class="fbtn m '+(sFlt===t.k?t.cls:'')+'" onclick="setF(\''+t.k+'\')">'+t.l+' '+t.n+'</button>').join('');const sel=document.getElementById('fSel');sel.innerHTML=fltrs.map(t=>'<option value="'+t.k+'"'+(sFlt===t.k?' selected':'')+'>'+t.l+' ('+t.n+')</option>').join('');sel.value=sFlt}
function setF(f){sFlt=f;vPage=0;rFlt();lastIds=[];rCards();rVPg()}
function visVeh(){return filtDlr().filter(v=>{if(sFlt==='expiring')return isExp(v);if(sFlt==='offline')return !isOn(v)&&v.st!=='available';if(sFlt==='online')return isOn(v);if(sFlt!=='all'&&v.st!==sFlt)return false;if(!sQ)return true;const q=sQ.toLowerCase();return v.id.toLowerCase().includes(q)||v.mdl.toLowerCase().includes(q)||v.pl.toLowerCase().includes(q)||(v.cust&&v.cust.toLowerCase().includes(q))||(v.ph&&v.ph.includes(q))}).sort((a,b)=>{const pa=isExp(a)?2:(ST[a.st]?.p??9);const pb=isExp(b)?2:(ST[b.st]?.p??9);return pa-pb})}
function rVPg(){const total=visVeh().length;const pages=Math.ceil(total/PG);if(vPage>=pages)vPage=Math.max(0,pages-1);const el=document.getElementById('vPg');if(total<=PG){el.innerHTML='';return}let btns='';for(let i=0;i<pages;i++){if(pages>7&&i>1&&i<pages-2&&Math.abs(i-vPage)>1){if(i===2||i===pages-3)btns+='<span style="color:var(--t3);font-size: var(--text-2xs);padding:0 2px">…</span>';continue}btns+='<button class="pg-b '+(i===vPage?'cur':'')+'" onclick="goVP('+i+')">'+(i+1)+'</button>'}el.innerHTML='<div class="pg-info m">'+(vPage*PG+1)+'–'+Math.min((vPage+1)*PG,total)+' of '+total+'</div><div class="pg-btns"><button class="pg-b" onclick="goVP('+(vPage-1)+')" '+(vPage===0?'disabled':'')+'>‹</button>'+btns+'<button class="pg-b" onclick="goVP('+(vPage+1)+')" '+(vPage>=pages-1?'disabled':'')+'>›</button></div>'}
function goVP(p){const pages=Math.ceil(visVeh().length/PG);vPage=Math.max(0,Math.min(p,pages-1));lastIds=[];rCards();rVPg()}
// CARDS
function rCards(){const el=document.getElementById('vList');const all=visVeh();const paged=all.slice(vPage*PG,(vPage+1)*PG);if(!paged.length){el.innerHTML='<div class="emp">No vehicles found</div>';lastIds=[];return}const ids=paged.map(v=>v.id+v.st+(v.id===sVeh?'S':'')+(expanded[v.id]?'E':''));const changed=ids.length!==lastIds.length||ids.some((x,i)=>x!==lastIds[i]);if(changed){const st=el.scrollTop;el.innerHTML=paged.map(bCard).join('');el.scrollTop=st;lastIds=ids}else{paged.forEach(v=>{if(v.st==='grace'){const c=document.getElementById('cd-'+v.id);if(c){const cd=gCD(v.gExp);if(cd&&!cd.ex)c.innerHTML=cdDig(cd,'var(--w)',cd.t<6*HOUR)}}if(isExp(v)){const c=document.getElementById('xc-'+v.id);if(c){const cd=gCD(v.cExp);if(cd&&!cd.ex)c.innerHTML=expDig(cd)}const c2=document.getElementById('xc2-'+v.id);if(c2){const cd=gCD(v.cExp);if(cd&&!cd.ex)c2.innerHTML=expDigFull(cd)}}})}}
function bCard(v){
  const sc=ST[v.st]||ST.available,dl=DLR.find(d=>d.id===v.op),pr=PRG.find(p=>p.id===v.prog);
  const sel=v.id===sVeh,exp=!!expanded[v.id],online=isOn(v),expiring=isExp(v);
  const cC=v.dc===0?'var(--d)':expiring?'var(--exp)':v.dc<=3?'var(--w)':'var(--g)';
  const gd=gGD(v);let fStr='';if(pr)fStr=pr.fee.t==='fixed'?'Rp '+pr.fee.a.toLocaleString('id-ID')+'/d':pr.fee.a+'%';
  let creditDisp='—';
  if(v.cust){if(expiring&&v.cExp){const cd=gCD(v.cExp);creditDisp=cd&&!cd.ex?'<span id="xc-'+v.id+'">'+expDig(cd)+'</span>':'0d'}else{creditDisp=Math.floor(v.dc)+'d'}}
  let cdB='';
  if(exp){
    if(expiring&&v.cExp){const cd=gCD(v.cExp);if(cd&&!cd.ex)cdB='<div class="cdb expwarn"><div class="cdl m" style="color:var(--exp)">⚠ EXPIRING — GRACE STARTS IN</div><div id="xc2-'+v.id+'">'+expDigFull(cd)+'</div></div>'}
    if(v.st==='grace'&&v.gExp){const cd=gCD(v.gExp);if(cd&&!cd.ex){cdB='<div class="cdb grace"><div class="cdl m" style="color:var(--w)">⚡ GRACE — IMMOBILIZE IN</div><div id="cd-'+v.id+'">'+cdDig(cd,'var(--w)',cd.t<6*HOUR)+'</div><div class="cdp" style="background:rgba(251,191,36,.04)"><div class="cdpf" style="width:'+Math.max(3,cd.t/(gd*DAY)*100)+'%;background:linear-gradient(90deg,var(--w),var(--d));animation:barPulse 2.5s ease-in-out infinite"></div></div></div>'}else{cdB='<div class="cdb immob"><div class="ibi"><div class="ib-d"></div><span class="ib-t m">IMMOBILIZED</span></div></div>'}}
    if(v.st==='immobilized')cdB='<div class="cdb immob"><div class="ibi"><div class="ib-d"></div><span class="ib-t m">IMMOBILIZED — AWAITING PAYMENT</span></div></div>';
    if(v.st==='paused'&&v.holiday){const dL=dBtw(new Date().toISOString().split('T')[0],v.holiday.end);cdB='<div class="cdb paused"><div class="cdl m" style="color:var(--bl)">⏸ HOLIDAY — '+v.holiday.reason.toUpperCase()+'</div><div style="font-size: var(--text-sm);color:var(--bl);font-weight:700" class="m">'+v.holiday.start+' → '+v.holiday.end+' ('+dL+'d)</div></div>'}
  }
  let acts='';
  if(exp&&v.st!=='available'){
    const payBtn='<button class="vab" style="border-color:rgba(52,211,153,.2);color:var(--g)" onclick="event.stopPropagation();openPay(\''+v.id+'\')">'+(v.st==='immobilized'?'🔓 Unlock':'💰 Credit')+'</button>';
    const holBtn=(v.st==='active'||v.st==='paused')?'<button class="vab" style="border-color:rgba(96,165,250,.2);color:var(--bl)" onclick="event.stopPropagation();'+(v.st==='paused'?"endHol('"+v.id+"')":"openHol('"+v.id+"')")+'">'+(v.st==='paused'?'▶️ Resume':'🏖️ Holiday')+'</button>':'';
    const immBtn=(v.st==='active'||v.st==='grace')?'<button class="vab" style="border-color:rgba(248,113,113,.2);color:var(--d)" onclick="event.stopPropagation()">🔒 Lock</button>':'';
    const waBtn=v.ph?'<button class="vab" style="border-color:var(--ac2);color:var(--ac)" onclick="event.stopPropagation()">📱 WA</button>':'';
    acts='<div class="va">'+payBtn+holBtn+immBtn+waBtn+'</div>'}
  return '<div class="vc '+(sel?'sel':'')+' '+(expiring?'expiring':'')+'" onclick="selV(\''+v.id+'\')" style="border-color:'+(sel?sc.c+'30':'var(--b1)')+'"><div class="acb" style="background:'+(expiring?'var(--exp)':sc.c)+'"></div><div class="vc-compact"><span class="vc-id m">'+v.id+'</span><div class="vc-badges"><span class="vb m" style="background:'+sc.bg+';color:'+sc.c+'">'+sc.l.toUpperCase()+'</span>'+(pr?'<span class="vb m" style="background:'+(pr.type==='RTO'?'var(--p1)':'var(--bl1)')+';color:'+(pr.type==='RTO'?'var(--p)':'var(--bl)')+'">'+pr.type+'</span><span class="vb vb-prg" style="background:var(--s3);color:var(--t2)">'+pr.sn+'</span>':'')+(expiring?'<span class="expbg m">⚠ EXPIRING</span>':'')+(v.holiday&&v.holiday.status==='approved'?'<span class="hbg m">⏸</span>':'')+'</div><span class="vc-prog">'+(pr?pr.sn:'')+'</span><span class="vc-cust">'+(v.cust||'—')+'</span><div class="vc-r4"><span class="vc-credits m" style="color:'+cC+'">'+creditDisp+'</span><div class="vc-online">'+(online?'<div class="odot" style="background:var(--g);box-shadow:0 0 2px rgba(52,211,153,.3)"></div><span style="color:var(--g)">Online</span>':'<div class="odot" style="background:#FF6B6B"></div><span style="color:#FF6B6B">Offline '+tAgo(v.ping)+'</span>')+'</div></div><button class="vc-xb" onclick="event.stopPropagation();togExp(\''+v.id+'\')">'+(exp?'▲':'▼')+'</button></div><div class="vc-detail '+(exp?'open':'')+'"><div class="vig"><div><div class="vil m">Model</div><div class="viv">'+v.mdl+'</div></div><div><div class="vil m">Plate</div><div class="viv m">'+v.pl+'</div></div><div><div class="vil m">Phone</div><div class="viv m" style="color:var(--ac)">'+(v.ph||'—')+'</div></div><div><div class="vil m">Dealer</div><div class="viv" style="color:'+(dl?dl.c:'var(--t2)')+'">'+( dl?dl.name:'—')+'</div></div><div><div class="vil m">CASAN Fee</div><div class="viv" style="color:var(--ac)">'+(fStr||'—')+'</div></div><div><div class="vil m">Battery</div><div class="viv m" style="color:'+(v.bat<20?'var(--d)':'var(--t2)')+'">'+v.bat+'%</div></div></div>'+(v.cust?'<div class="cb"><div class="cbh"><div><div class="cbl m">CREDITS</div><div class="cbv m" style="color:'+cC+'">'+(expiring?'< 1':Math.floor(v.dc))+' <span style="font-size: var(--text-2xs);font-weight:500;color:var(--t3)">days</span></div></div><div style="text-align:right"><div class="cbl m">RATE</div><div style="font-size: var(--text-sm);font-weight:700;color:var(--t1)" class="m">'+fRp(v.dr)+'/d</div></div></div><div class="cbt"><div class="cbf" style="width:'+(v.td>0?(v.dc/v.td)*100:0)+'%;background:'+cC+'"></div></div><div class="cbx m"><span>Grace: '+gd+'d</span><span>'+v.paid+'/'+v.tot+' cycles</span></div></div>':'')+cdB+'<div class="vm"><div class="vmi"><span class="vmi-i">📍</span><span class="vmi-v m">'+v.lat.toFixed(3)+','+v.lng.toFixed(3)+'</span></div><div class="vmi"><span class="vmi-i">⚡</span><span class="vmi-v m">'+v.spd+'km/h</span></div><div class="vmi"><span class="vmi-i">📡</span><span class="vmi-v m">'+(online?'Online':tAgo(v.ping))+'</span></div></div>'+acts+'</div></div>'}
function cdDig(cd,col,crit){return '<div class="cdd">'+[{v:cd.d,u:'d'},{v:cd.h,u:'h'},{v:cd.m,u:'m'},{v:cd.s,u:'s'}].map((p,i)=>'<span class="cdn m" style="color:'+col+';'+(crit&&p.u==='s'?'animation:crit 1.2s ease-in-out infinite':'')+'">'+String(p.v).padStart(2,'0')+'</span><span class="cdu">'+p.u+'</span>'+(i<3?'<span class="cds2">:</span>':'')).join('')+'</div>'}
function expDig(cd){const h=cd.d*24+cd.h;return '<span class="m" style="color:var(--exp);font-weight:700">'+h+'h'+String(cd.m).padStart(2,'0')+'m</span>'}
function expDigFull(cd){const h=cd.d*24+cd.h;return '<div class="cdd"><span class="cdn m" style="color:var(--exp)">'+String(h).padStart(2,'0')+'</span><span class="cdu">h</span><span class="cds2">:</span><span class="cdn m" style="color:var(--exp)">'+String(cd.m).padStart(2,'0')+'</span><span class="cdu">m</span><span class="cds2">:</span><span class="cdn m" style="color:var(--exp);animation:crit 1.2s ease-in-out infinite">'+String(cd.s).padStart(2,'0')+'</span><span class="cdu">s</span></div>'}
function togExp(id){expanded[id]=!expanded[id];lastIds=[];rCards()}
function selV(id){sVeh=sVeh===id?null:id;lastIds=[];rCards();if(sVeh&&mapReady){const v=VEH.find(x=>x.id===id);if(v)map.flyTo([v.lat,v.lng],15,{duration:.5})}}
// PAYMENT
function openPay(vid){payV=vid;const v=VEH.find(x=>x.id===vid);if(!v)return;const sc=ST[v.st];document.getElementById('paySub').textContent=v.id+' — '+v.mdl+' • '+v.cust;document.getElementById('payInfo').innerHTML='<div class="ir"><span class="ik">Status</span><span class="iv2" style="color:'+sc.c+'">'+sc.ic+' '+sc.l+'</span></div><div class="ir"><span class="ik">Credits</span><span class="iv2 m">'+(v.dc<1?'<1':Math.floor(v.dc))+'d</span></div><div class="ir"><span class="ik">Rate</span><span class="iv2 m">'+fRp(v.dr)+'/day</span></div>'+(v.st==='immobilized'?'<div class="ir"><span class="ik" style="color:var(--d)">⚠️</span><span class="iv2" style="color:var(--g)">Unlocks on payment</span></div>':'');document.getElementById('payD').value=7;document.getElementById('payA').value=(7*v.dr).toLocaleString('id-ID');document.getElementById('payMet').value='bank';togPay();document.getElementById('payM').classList.add('open')}
function togPay(){const m=document.getElementById('payMet').value;document.getElementById('bF').style.display=m==='bank'?'block':'none';document.getElementById('qF').style.display=m==='qris'?'block':'none';document.getElementById('oF').style.display=m==='other'?'block':'none'}
function confPay(){const v=VEH.find(x=>x.id===payV);if(!v)return;const days=parseInt(document.getElementById('payD').value)||7;const method=document.getElementById('payMet').value;const pr=PRG.find(p=>p.id===v.prog);const dl=DLR.find(d=>d.id===v.op);const amt=days*v.dr;let cf=0;if(pr)cf=pr.fee.t==='fixed'?pr.fee.a*days:Math.round(amt*(pr.fee.a/100));v.dc+=days;v.td+=days;v.paid++;v.cExp=null;if(['immobilized','grace'].includes(v.st)){v.st='active';v.gExp=null}TXS.unshift({id:'TX-'+(2000+TXS.length),vid:v.id,cust:v.cust,ph:v.ph,op:v.op,opN:dl?dl.name:'',opC:dl?dl.c:'#999',prog:v.prog,progN:pr?pr.name:'',progT:pr?pr.type:'',days,dr:v.dr,amt,cf,oe:amt-cf,st:'paid',dt:new Date().toISOString(),method});clM('payM');toast('✅ '+days+'d → '+v.id);refAll()}
// HOLIDAY
function openHol(vid){holV=vid;const v=VEH.find(x=>x.id===vid);if(!v)return;document.getElementById('holSub').textContent=v.id+' — '+v.cust;document.getElementById('holInfo').innerHTML='<div class="ir"><span class="ik">Credits</span><span class="iv2 m">'+Math.floor(v.dc)+'d</span></div><div class="ir"><span class="ik">Effect</span><span class="iv2" style="color:var(--bl)">Credits freeze</span></div>';const td=new Date().toISOString().split('T')[0];document.getElementById('holS').value=td;document.getElementById('holE').value=new Date(Date.now()+7*DAY).toISOString().split('T')[0];document.getElementById('holC').style.display='none';document.getElementById('holS').onchange=document.getElementById('holE').onchange=calcHol;calcHol();document.getElementById('holM').classList.add('open')}
function calcHol(){const s=document.getElementById('holS').value,e=document.getElementById('holE').value;if(s&&e){const d=dBtw(s,e);const c=document.getElementById('holC');c.style.display='block';c.innerHTML='⏸ <b>'+d+'d</b> pause: '+s+' → '+e}}
function apprHol(){const v=VEH.find(x=>x.id===holV);if(!v)return;v.holiday={start:document.getElementById('holS').value,end:document.getElementById('holE').value,reason:document.getElementById('holR').value,status:'approved',notes:document.getElementById('holN').value};v.st='paused';v.cExp=null;clM('holM');toast('⏸ Holiday → '+v.id);refAll()}
function endHol(vid){const v=VEH.find(x=>x.id===vid);if(!v)return;v.holiday=null;v.st='active';toast('▶️ Resumed '+v.id);refAll()}
// CSV
function csvExport(){let tx=filtTxDlr();if(sPrg)tx=tx.filter(t=>t.prog===sPrg);if(sTxF!=='all')tx=tx.filter(t=>t.st===sTxF);const hdr='TX ID,Date,Customer,Phone,Dealer,Program,Method,Days,Amount,Dealer Earning,CASAN Fee,Status\n';const rows=tx.map(t=>t.id+','+fDt(t.dt)+',"'+t.cust+'",'+(t.ph||'')+','+t.opN+','+t.progN+','+t.method+','+t.days+','+t.amt+','+t.oe+','+t.cf+','+t.st).join('\n');const blob=new Blob([hdr+rows],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='casan-tx-'+new Date().toISOString().split('T')[0]+'.csv';a.click();toast('📥 CSV exported')}
// FINANCE
function rPrg(){const el=document.getElementById('pList');const ps=sDlr==='all'?PRG:PRG.filter(p=>p.op===sDlr);el.innerHTML='<div style="font-size: var(--text-2xs);color:var(--t3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px" class="m">PROGRAMS ('+ps.length+')</div>'+ps.map(p=>{const dl=DLR.find(x=>x.id===p.op);const sel=sPrg===p.id;const tx=TXS.filter(t=>t.prog===p.id&&t.st==='paid');const tr=tx.reduce((s,t)=>s+t.amt,0);const tf=tx.reduce((s,t)=>s+t.cf,0);return '<div class="pc '+(sel?'sel':'')+'" onclick="selPrg(\''+p.id+'\')"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="pn">'+p.name+'</div><div class="po" style="color:'+(dl?dl.c:'var(--t2)')+'">'+( dl?dl.name:'')+'</div></div><span class="pt m" style="background:'+(p.type==='RTO'?'var(--p1)':'var(--bl1)')+';color:'+(p.type==='RTO'?'var(--p)':'var(--bl)')+'">'+p.type+'</span></div><div class="psg"><div><div class="psl m">Veh</div><div class="psv m">'+p.veh+'</div></div><div><div class="psl m">Active</div><div class="psv m" style="color:var(--g)">'+p.act+'</div></div><div><div class="psl m">Op.Earn</div><div class="psv m" style="color:'+(dl?dl.c:'var(--t1)')+'">'+fRp(tr-tf)+'</div></div><div><div class="psl m">CASAN</div><div class="psv m" style="color:var(--ac)">'+fRp(tf)+'</div></div></div></div>'}).join('')}
function selPrg(id){sPrg=sPrg===id?null:id;tPage=0;rPrg();rFin()}
function rFin(){
  const el=document.getElementById('fMain');let tx=filtTxDlr();if(sPrg)tx=tx.filter(t=>t.prog===sPrg);
  const ftx=sTxF==='all'?tx:tx.filter(t=>t.st===sTxF);
  const pd=tx.filter(t=>t.st==='paid');const tr=pd.reduce((s,t)=>s+t.amt,0);const tf=pd.reduce((s,t)=>s+t.cf,0);
  const od=tx.filter(t=>t.st==='overdue');const oa=od.reduce((s,t)=>s+t.amt,0);
  const cbo={};pd.forEach(t=>{if(!cbo[t.op])cbo[t.op]={n:t.opN,c:t.opC,r:0,f:0};cbo[t.op].r+=t.amt;cbo[t.op].f+=t.cf});
  const expC=filtDlr().filter(isExp).length;
  const txPages=Math.ceil(ftx.length/TXP);if(tPage>=txPages)tPage=Math.max(0,txPages-1);
  const txSlice=ftx.slice(tPage*TXP,(tPage+1)*TXP);
  let tPgH='';if(ftx.length>TXP){let btns='';for(let i=0;i<txPages;i++){if(txPages>7&&i>1&&i<txPages-2&&Math.abs(i-tPage)>1){if(i===2||i===txPages-3)btns+='<span style="color:var(--t3);font-size: var(--text-2xs);padding:0 2px">…</span>';continue}btns+='<button class="pg-b '+(i===tPage?'cur':'')+'" onclick="goTP('+i+')">'+(i+1)+'</button>'}tPgH='<div class="tpg"><div class="pg-info m">'+(tPage*TXP+1)+'–'+Math.min((tPage+1)*TXP,ftx.length)+' of '+ftx.length+'</div><div class="pg-btns"><button class="pg-b" onclick="goTP('+(tPage-1)+')" '+(tPage===0?'disabled':'')+'>‹</button>'+btns+'<button class="pg-b" onclick="goTP('+(tPage+1)+')" '+(tPage>=txPages-1?'disabled':'')+'>›</button></div></div>'}
  el.innerHTML=(expC>0?'<div class="falert"><span class="falert-ic">⚠️</span><span class="falert-txt">'+expC+' vehicle'+(expC>1?'s':'')+' expiring within 24h — credits running out, will enter grace period soon</span><span class="falert-n m">'+expC+'</span></div>':'')+
    '<div class="fsum">'+[{l:'Revenue',v:fRp(tr),c:'var(--t1)',s:pd.length+' paid',sc:'var(--g)'},{l:'Op. Earnings',v:fRp(tr-tf),c:'var(--p)',s:(tr>0?Math.round((tr-tf)/tr*100):0)+'%',sc:'var(--t3)'},{l:'CASAN',v:fRp(tf),c:'var(--ac)',s:(tr>0?Math.round(tf/tr*100):0)+'%',sc:'var(--ac)'},{l:'Outstanding',v:fRp(oa),c:'var(--d)',s:od.length+' overdue',sc:'var(--w)'}].map(s=>'<div class="fsc"><div class="fsl m">'+s.l+'</div><div class="fsv sm m" style="color:'+s.c+'">'+s.v+'</div><div class="fsd" style="color:'+s.sc+'">'+s.s+'</div></div>').join('')+'</div>'+
    '<div style="background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);padding:10px 12px"><div style="font-size: var(--text-md);font-weight:800;margin-bottom:6px">Commission by Dealer</div>'+Object.values(cbo).map(o=>{const oe=o.r-o.f;return '<div class="cr"><span class="crl" style="color:'+o.c+'">'+o.n+'</span><div class="crb"><div class="crbf" style="width:'+(o.r>0?(oe/o.r*100):0)+'%;background:'+o.c+'"></div><div class="crbf" style="width:'+(o.r>0?(o.f/o.r*100):0)+'%;background:var(--ac)"></div></div><span class="crv m" style="color:'+o.c+'">'+fRp(oe)+'</span><span class="crv m" style="color:var(--ac)">'+fRp(o.f)+'</span></div>'}).join('')+'</div>'+
    '<div class="tw"><div class="twh"><span class="twt">Transactions</span><div class="twf">'+['all','paid','overdue','pending'].map(f=>'<button class="twfb m '+(sTxF===f?'on':'')+'" onclick="setTxF(\''+f+'\')">'+f[0].toUpperCase()+f.slice(1)+'</button>').join('')+'<button class="csv-btn" onclick="csvExport()">📥 CSV</button></div></div><div class="twbo"><table class="tt"><thead><tr><th class="m">TX</th><th class="m">Date</th><th class="m">Customer</th><th class="m">Dealer</th><th class="m">Program</th><th class="m">Method</th><th class="m">Days</th><th class="m">Amount</th><th class="m">Op.</th><th class="m">CASAN</th><th class="m">Status</th></tr></thead><tbody>'+txSlice.map(t=>{const sc2=t.st==='paid'?'var(--g)':t.st==='overdue'?'var(--d)':'var(--w)';const sb2=t.st==='paid'?'var(--g1)':t.st==='overdue'?'var(--d1)':'var(--w1)';const mi={bank:'🏦',qris:'📱',cash:'💵'}[t.method]||'📝';return '<tr><td class="m" style="color:var(--t1);font-weight:700">'+t.id+'</td><td class="m" style="font-size: var(--text-2xs)">'+fDt(t.dt)+'</td><td style="font-size: var(--text-xs)">'+t.cust+'</td><td><span style="color:'+t.opC+';font-weight:600;font-size: var(--text-xs)">'+t.opN+'</span></td><td style="font-size: var(--text-2xs)">'+t.progN+'</td><td style="font-size: var(--text-xs)">'+mi+' '+t.method+'</td><td class="m">'+t.days+'d</td><td class="m" style="color:var(--t1);font-weight:700">'+fRp(t.amt)+'</td><td class="m" style="color:'+t.opC+';font-size: var(--text-2xs)">'+fRp(t.oe)+'</td><td class="m" style="color:var(--ac);font-size: var(--text-2xs)">'+fRp(t.cf)+'</td><td><span class="m" style="font-size: var(--text-3xs);font-weight:700;padding:2px 5px;border-radius:3px;background:'+sb2+';color:'+sc2+'">'+t.st.toUpperCase()+'</span></td></tr>'}).join('')+'</tbody></table>'+(ftx.length===0?'<div class="emp">No transactions</div>':'')+'</div>'+tPgH+'</div>'}
function setTxF(f){sTxF=f;tPage=0;rFin()}
function goTP(p){let tx=filtTxDlr();if(sPrg)tx=tx.filter(t=>t.prog===sPrg);const ftx=sTxF==='all'?tx:tx.filter(t=>t.st===sTxF);const pages=Math.ceil(ftx.length/TXP);tPage=Math.max(0,Math.min(p,pages-1));rFin()}
function refAll(){rDSel();rStats();rFlt();lastIds=[];rCards();rVPg();updMkrs();rPrg();rFin()}
document.getElementById('sIn').addEventListener('input',e=>{sQ=e.target.value;vPage=0;lastIds=[];rCards();rVPg()});
document.getElementById('payD').addEventListener('input',e=>{const v=VEH.find(x=>x.id===payV);if(!v)return;document.getElementById('payA').value=((parseInt(e.target.value)||0)*v.dr).toLocaleString('id-ID')});
setInterval(()=>{if(view==='fleet')rCards()},1000);
rDSel();rNav();rStats();rFlt();rCards();rVPg();rPrg();rFin();
window.addEventListener('load',()=>{setTimeout(initMap,100)});
</script>
</body>
</html>
